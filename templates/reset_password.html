{% extends "base.html" %}
{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='favicon.png') }}" alt="Meld Pharm" width="48">
            <span>Barnatore Meld Pharm</span>
        </div>
        <h2 class="auth-title">Fjalëkalim i ri</h2>
        <p class="auth-sub" style="margin-bottom:1.4rem;">Zgjidhni një fjalëkalim të ri të sigurt.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="aform-group">
                <label>Fjalëkalimi i ri</label>
                <div class="ainput-wrap"><i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control" required minlength="8" placeholder="Të paktën 8 karaktere dhe 1 numër">
                </div>
                <small style="color:#94a3b8;font-size:0.78rem;display:block;margin-top:0.3rem;">Minimumi 8 karaktere dhe të paktën 1 numër.</small>
            </div>
            <button type="submit" class="auth-btn"><i class="fas fa-check"></i> Ndrysho fjalëkalimin</button>
        </form>
        <div class="auth-guest">
            <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left"></i> Kthehu te kyçja</a>
        </div>
    </div>
</div>
<style>
.main-content { margin-top:0 !important; }
.auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem 1rem; background:linear-gradient(135deg,#F7F3EE,#EFE7DE); font-family:'Inter','Poppins',sans-serif; }
.auth-card { background:#fff; border-radius:20px; box-shadow:0 16px 48px rgba(43,43,43,0.10); padding:2rem 1.75rem; width:100%; max-width:420px; }
.auth-logo { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.75rem; font-weight:700; font-size:0.95rem; color:#4F5D4E; }
.auth-logo img { border-radius:10px; background:rgba(79,93,78,0.08); padding:5px; }
.auth-title { font-family:'Cormorant Garamond',Georgia,serif; font-size:1.7rem; font-weight:600; color:#2B2B2B; margin-bottom:0.2rem; letter-spacing:-0.01em; }
.auth-sub { color:#7A7068; font-size:0.87rem; }
.aform-group { margin-bottom:1rem; }
.aform-group label { display:block; font-size:0.83rem; font-weight:600; color:#2B2B2B; margin-bottom:0.3rem; }
.ainput-wrap { position:relative; }
.ainput-wrap i { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.8rem; pointer-events:none; }
.ainput-wrap .form-control { padding-left:2.4rem !important; border-radius:10px !important; border:1.5px solid #E2D9CE !important; height:44px; font-size:0.9rem; width:100%; font-family:'Inter','Poppins',sans-serif; }
.ainput-wrap .form-control:focus { border-color:#6C7A61 !important; box-shadow:0 0 0 3px rgba(108,122,97,0.12) !important; outline:none; }
.auth-btn { width:100%; padding:0.85rem; margin-top:0.5rem; background:#4F5D4E; color:#fff; border:none; border-radius:12px; font-family:'Inter','Poppins',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:background 0.2s,transform 0.2s; }
.auth-btn:hover { background:#2B2B2B; transform:translateY(-1px); }
.auth-guest { text-align:center; margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid #EFE7DE; }
.auth-guest a { color:#7A7068; font-size:0.85rem; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.auth-guest a:hover { color:#4F5D4E; }
</style>
{% endblock %}
